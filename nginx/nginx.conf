events {}

http {
    upstream api_gateway {
        server host.docker.internal:9000;
        server host.docker.internal:9001 backup;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}